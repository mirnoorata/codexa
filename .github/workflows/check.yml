name: Codexa Check

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: codexa-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Skip fork PRs by default — prevents drive-by Actions-minute abuse.
    # Belt-and-braces with GitHub's "Require approval for all outside
    # collaborators" setting; do not rely on either alone.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce clean-runner parity
        run: rm -rf dist .codex/codebase .codex/cache

      - name: Run Codexa gates
        run: npm run check

      # The retrieval-quality gate: a scenario FAILS outright if the raw
      # rg/git baseline beats Codexa, output exceeds budgets, or packets are
      # heuristic-heavy. Seeded per commit so the synthetic anti-cheat
      # holdouts cannot be overfitted. `npm run check` already built dist.
      - name: Run retrieval eval gate (fails if raw grep wins)
        run: npm run eval:ci

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codexa-eval-report
          path: .codex/cache/codexa-eval/latest.json
          if-no-files-found: ignore
          retention-days: 30

  package-smoke:
    # Keep this as a separate source-to-tarball gate so package installation
    # failures cannot be hidden by source-tree tests.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run package install smoke
        run: npm run smoke:package

  benchmark:
    # Guard only against clear hot-path regressions; thresholds live in the
    # benchmark script and are intentionally generous for shared CI runners.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run hot-path benchmark
        run: npm run benchmark:ci

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codexa-hot-path-benchmark
          path: .codex/cache/codexa-benchmarks/latest.json
          if-no-files-found: ignore
          retention-days: 7
